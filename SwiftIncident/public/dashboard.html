<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Emergency Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
background:#181414;
}

/* HAMBURGER */

.hamburger{
position:absolute;
top:15px;
left:15px;
font-size:26px;
cursor:pointer;
z-index:1100;
background:rgb(100, 98, 98);
padding:8px 12px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.3);
}

/* LEFT SLIDING PANEL */

.left{
width:260px;
background:url('https://img.freepik.com/free-vector/wave-background-abstract-gradient-design_483537-3688.jpg?semt=ais_hybrid&w=740&q=80');
color:white;
padding:20px;
overflow-y:auto;
position:fixed;
left:-280px;
top:0;
height:100%;
transition:0.3s;
z-index:1000;
box-shadow:2px 0 8px rgba(0,0,0,0.3);
}

.left.active{
left:0;
}

.left img{
width:90px;
border-radius:50%;
}

.left button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:5px;
cursor:pointer;
}

.sos{
background:rgb(233, 13, 13);
color:white;
font-weight:bold;
}

/* CENTER MAP */

.center{
flex:1;
position:relative;
}

#map{
height:100vh;
width:100%;
}

/* MOVE ZOOM BUTTONS TO RIGHT */

.leaflet-top.leaflet-left{
display:none;
}

.leaflet-top.leaflet-right{
top:20px;
right:20px;
}

/* RIGHT PANEL */

.right{
width:320px;
color: white;
background:url('https://img.freepik.com/free-vector/wave-background-abstract-gradient-design_483537-3688.jpg?semt=ais_hybrid&w=740&q=80');
border-left:1px solid #ddd;
display:flex;
flex-direction:column;
}

.needAreas{
height:60%;
overflow:auto;
padding:15px;
}

.needItem{
background:#2e2c2c;
padding:10px;
margin-bottom:10px;
border-radius:6px;
}

/* FEEDBACK AREA */

.messages{
height:40%;
border-top:1px solid #ccc;
padding:15px;
display:flex;
flex-direction:column;
}

.messages textarea{
width:100%;
height:60px;
resize:none;
padding:6px;
margin-bottom:8px;
}

.messages button{
padding:6px;
cursor:pointer;
}

#feedbackList{
margin-top:10px;
overflow:auto;
font-size:14px;
}

</style>
</head>

<body>

<div class="hamburger" onclick="toggleSidebar()">☰</div>


<div class="left">

<center>
<img src="https://static.vecteezy.com/system/resources/previews/019/879/186/non_2x/user-icon-on-transparent-background-free-png.png">
<h3 id="username">User</h3>
</center>

<p>Phone: 9876543210</p>
<p>Blood Group: O+</p>

<p id="locationInfo">Detecting location...</p>

<h4>Emergency Contacts</h4>
<ul>
<li>Father</li>
<li>Friend</li>
<li>Brother</li>
</ul>

<button class="sos">SEND SOS</button>

</div>

<!-- MAP -->

<div class="center">
<div id="map"></div>
</div>

<!-- RIGHT PANEL -->

<div class="right">

<div class="needAreas">

<h3>High Need Areas</h3>

<div class="needItem">Accident Zone - Sector 45</div>
<div class="needItem">High Risk Road - Highway 21</div>
<div class="needItem">Emergency Needed - Market Road</div>

</div>

<div class="messages">

<h3>User Feedback</h3>

<textarea id="feedbackText" placeholder="Report accident, danger area, road block..."></textarea>

<button onclick="submitFeedback()">Send</button>

<div id="feedbackList"></div>

</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/* USERNAME FROM URL */

const params = new URLSearchParams(window.location.search);
const username = params.get("username");

if(username){
document.getElementById("username").innerText = username;
}

/* CREATE MAP */

var map = L.map('map', {
zoomControl:false
}).setView([20.5937,78.9629],5);

/* ADD ZOOM BUTTON TO RIGHT */

L.control.zoom({
position:'topright'
}).addTo(map);

/* MAP TILE */

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

/* SIDEBAR TOGGLE */

function toggleSidebar(){
document.querySelector(".left").classList.toggle("active");
}

/* GET USER LOCATION */

if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(showLocation, locationError);
}

function showLocation(position){

let lat = position.coords.latitude;
let lng = position.coords.longitude;

document.getElementById("locationInfo").innerHTML =
"Latitude: " + lat + "<br>Longitude: " + lng;

map.setView([lat,lng],14);

L.marker([lat,lng])
.addTo(map)
.bindPopup("You are here")
.openPopup();
}

function locationError(){
document.getElementById("locationInfo").innerText =
"Location access denied.";
}

/* SOS BUTTON */

document.querySelector(".sos").onclick=function(){

navigator.geolocation.getCurrentPosition(function(pos){

let lat = pos.coords.latitude;
let lng = pos.coords.longitude;

L.marker([lat,lng])
.addTo(map)
.bindPopup("🚨 Emergency SOS")
.openPopup();

alert("Emergency location shared!");

});

};

/* FEEDBACK SYSTEM */

function submitFeedback(){

let text = document.getElementById("feedbackText").value;

if(text.trim()==""){
alert("Please write feedback");
return;
}

let list = document.getElementById("feedbackList");

let item = document.createElement("p");

item.innerText = "• "+text;

list.appendChild(item);

navigator.geolocation.getCurrentPosition(function(pos){

let lat = pos.coords.latitude;
let lng = pos.coords.longitude;

L.marker([lat,lng])
.addTo(map)
.bindPopup("User Report: "+text)
.openPopup();

});

document.getElementById("feedbackText").value="";

}

</script>

</body>
</html>
